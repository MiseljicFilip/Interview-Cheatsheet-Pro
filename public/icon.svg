<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0f172a"/>

  <!-- Back card -->
  <rect x="148" y="210" width="240" height="162" rx="18" fill="#1e3a5f"
        transform="rotate(9 268 291)"/>

  <!-- Middle card -->
  <rect x="140" y="196" width="240" height="162" rx="18" fill="#2563eb"
        transform="rotate(4 260 277)"/>

  <!-- Front card -->
  <rect x="132" y="182" width="240" height="162" rx="18" fill="#f1f5f9"/>

  <!-- Front card content: Q line -->
  <rect x="162" y="220" width="80" height="13" rx="6.5" fill="#0f172a"/>
  <!-- Answer lines -->
  <rect x="162" y="247" width="176" height="9" rx="4.5" fill="#94a3b8"/>
  <rect x="162" y="266" width="148" height="9" rx="4.5" fill="#94a3b8"/>
  <rect x="162" y="285" width="162" height="9" rx="4.5" fill="#94a3b8"/>
  <!-- Divider -->
  <rect x="162" y="310" width="180" height="2" rx="1" fill="#e2e8f0"/>

  <!-- Recall badge (circular arrow) -->
  <circle cx="362" cy="152" r="58" fill="#6366f1"/>
  <!-- Arc -->
  <path d="M335 136 a30 30 0 1 1 0 34"
        stroke="white" stroke-width="9" fill="none"
        stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="326,170 335,170 335,179"
            stroke="white" stroke-width="9" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
